# Configuración de Alembic para Aquamarine (E00 · T00.2.2).
# La URL de la base de datos NO se fija aquí: `alembic/env.py` la toma de
# `app.core.config.settings.DATABASE_URL` (entorno / .env).

[alembic]
# Ruta de los scripts de migración (relativa a este archivo).
script_location = alembic

# Plantilla de nombres de archivo de migración con fecha para orden cronológico.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Ruta base para `version_locations`; usa os.pathsep como separador.
prepend_sys_path = .

# Zona horaria para los timestamps de las migraciones (vacío = hora local).
# timezone =

# sqlalchemy.url se inyecta en runtime desde env.py (ver settings.DATABASE_URL).
sqlalchemy.url =


[post_write_hooks]
# Sin hooks por ahora (se pueden agregar black/ruff más adelante).


# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
